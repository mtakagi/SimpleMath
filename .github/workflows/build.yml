name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # macOS と Linux は既存のアクションを利用
    - name: Setup Swift (macOS / Linux)
      if: runner.os != 'Windows'
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: '6.2'

    # Windows 環境専用のセットアップアクション
    - name: Setup Swift (Windows)
      if: runner.os == 'Windows'
      uses: sushichop/gha-swift-env@v1
      with:
        swift-version: '6.2'

    - name: Build Library
      run: swift build --target SimpleMath

  build-musl:
      runs-on: ubuntu-latest
      container:
        image: swift:6.2-alpine # 公式の Alpine ベースの Swift イメージを使用
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Library
        run: swift build --target SimpleMath